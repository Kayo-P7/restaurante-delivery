<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brasa & Arte — Reservas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <nav class="nav" id="nav">
        <a class="nav__logo" href="index.html">Brasa<span>&</span>Arte</a>
        <button class="nav__toggle" id="navToggle" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav__links" id="navLinks">
            <li><a href="index.html" class="nav__link" data-page="home">Início</a></li>
            <li><a href="cardapio.html" class="nav__link" data-page="cardapio">Cardápio</a></li>
            <li><a href="delivery.html" class="nav__link" data-page="delivery">Delivery</a></li>
            <li><a href="reservas.html" class="nav__link active" data-page="reservas">Reservas</a></li>
            <li><a href="cadastro.html" class="nav__link" data-page="cadastro">Cadastro</a></li>
        </ul>
    </nav>


    <section class="page active" id="reservas">
        <div class="page-hero page-hero--red">
            <h1>Reservas</h1>
            <p>Reserve sua mesa com antecedência</p>
        </div>
        <div class="container" style="padding:3rem 1rem;max-width:680px">
            <div class="form-card">
                <h2 class="section__title" style="margin-bottom:1.5rem">Fazer Reserva</h2>
                <form id="reservaForm" onsubmit="submeterReserva(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nome completo</label>
                            <input type="text" class="input" id="resNome" placeholder="João Silva" required />
                        </div>
                        <div class="form-group">
                            <label>Telefone</label>
                            <input type="tel" class="input" id="resTel" placeholder="(91) 99999-0000" required />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Data</label>
                            <input type="date" class="input" id="resData" required />
                        </div>
                        <div class="form-group">
                            <label>Horário</label>
                            <select class="input" id="resHorario" required>
                                <option value="">Selecione</option>
                                <option>12:00</option>
                                <option>13:00</option>
                                <option>14:00</option>
                                <option>19:00</option>
                                <option>20:00</option>
                                <option>21:00</option>
                                <option>22:00</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Pessoas</label>
                            <select class="input" id="resPessoas" required>
                                <option value="">Quantas pessoas?</option>
                                <option>1</option>
                                <option>2</option>
                                <option>3</option>
                                <option>4</option>
                                <option>5</option>
                                <option>6</option>
                                <option>7–10</option>
                                <option>+10 (salão privativo)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Ocasião</label>
                            <select class="input" id="resOcasiao">
                                <option value="">Selecione (opcional)</option>
                                <option>Aniversário</option>
                                <option>Jantar Romântico</option>
                                <option>Confraternização</option>
                                <option>Reunião de Negócios</option>
                                <option>Outro</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Observações</label>
                        <textarea class="input" id="resObs" rows="3"
                            placeholder="Alguma restrição alimentar, pedido especial..."></textarea>
                    </div>
                    <button type="submit" class="btn btn--primary" style="width:100%;margin-top:.5rem">Confirmar
                        Reserva</button>
                </form>
                <div class="success-msg" id="reservaSuccess">
                    <div class="success-icon">✅</div>
                    <h3>Reserva Confirmada!</h3>
                    <p id="reservaResumo"></p>
                    <button class="btn btn--outline" onclick="novaReserva()">Fazer nova reserva</button>
                </div>
            </div>

            <!--lista de reservass salvas. -->
            <div id="reservaListWrap" style="display:none;margin-top:2rem">
                <h3 style="color:var(--red);margin-bottom:1rem">📋 Reservas Registradas</h3>
                <div id="reservaList"></div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
